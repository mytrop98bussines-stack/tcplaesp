name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main # Si usas 'master', cambia 'main' por 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout el repositorio
        uses: actions/checkout@v4

      # Creamos la carpeta limpia para evitar el "unexpected error" de antes
      - name: Preparar carpeta de despliegue
        run: |
          mkdir -p _dist
          cp index.html _dist/
          # Si tienes más archivos sueltos (como estilos.css), puedes listarlos aquí:
          # cp estilos.css _dist/ 2>/dev/null || true

      - name: Desplegar en Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          
